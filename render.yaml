services:
  - type: web
    name: sample-chain-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://neondb_owner:npg_7uzY6UTJnglc@ep-red-mouse-aie753ai.c-4.us-east-1.aws.neon.tech/neondb
      - key: SECRET_KEY
        value: your-super-secret-key-change-in-production-2026
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: APP_NAME
        value: Sample Chain of Custody
      - key: DEBUG
        value: false
      - key: API_V1_PREFIX
        value: /api/v1
      - key: UPLOAD_DIR
        value: ./uploads/photos
      - key: MAX_PHOTO_SIZE
        value: 5242880
      - key: ALLOWED_ORIGINS
        value: https://sample-chain-frontend.onrender.com
      - key: APP_URL
        value: https://sample-chain-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.13.5
