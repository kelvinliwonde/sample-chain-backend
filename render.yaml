services:
  - type: web
    name: sample-chain-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sample-chain-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: APP_NAME
        value: Sample Chain of Custody
      - key: DEBUG
        value: false
      - key: API_V1_PREFIX
        value: /api/v1
      - key: UPLOAD_DIR
        value: ./uploads/photos
      - key: MAX_PHOTO_SIZE
        value: 5242880
      - key: ALLOWED_ORIGINS
        value: https://sample-chain-frontend.vercel.app
      - key: APP_URL
        value: https://sample-chain-frontend.vercel.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: sample-chain-db
    plan: free